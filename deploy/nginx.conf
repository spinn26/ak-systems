# /etc/nginx/sites-available/aksystems.pro
# После certbot этот файл будет изменён — он допишет 443-блок и редирект.
# Сохраняется только версия до SSL.

server {
    listen 80;
    listen [::]:80;
    server_name aksystems.pro www.aksystems.pro;

    # Корень для certbot webroot-проверок (необязательно, если используется --nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Next.js за reverse proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Статика Next.js — долгий кэш (хэш в имени)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Картинки и публичные ассеты
    location ~* \.(?:ico|gif|jpe?g|png|webp|avif|svg|woff2?|ttf)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Безопасность (базовый набор)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Размер тела — для формы с textarea
    client_max_body_size 1M;

    # Логи
    access_log /var/log/nginx/aksystems.pro.access.log;
    error_log  /var/log/nginx/aksystems.pro.error.log;
}
